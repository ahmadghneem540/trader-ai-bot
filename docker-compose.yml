version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: traderai-postgres
    environment:
      POSTGRES_USER: traderai
      POSTGRES_PASSWORD: traderai_secret_password
      POSTGRES_DB: traderai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traderai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: traderai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+psycopg2://traderai:traderai_secret_password@postgres:5432/traderai
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: traderai-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
